<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the logo -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="40" cy="40" r="35" fill="url(#primaryGradient)" filter="url(#dropShadow)" opacity="0.1"/>
  
  <!-- Main icon - Abstract technology symbol -->
  <g transform="translate(40, 40)">
    <!-- Central core -->
    <circle cx="0" cy="0" r="8" fill="url(#primaryGradient)" filter="url(#dropShadow)"/>
    
    <!-- Orbital rings representing connectivity -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Connection nodes -->
    <circle cx="18" cy="0" r="4" fill="#FF8C00"/>
    <circle cx="-18" cy="0" r="4" fill="#FFD700"/>
    <circle cx="0" cy="18" r="4" fill="#90EE90"/>
    <circle cx="0" cy="-18" r="4" fill="#FF8C00"/>
    
    <!-- Diagonal connection nodes -->
    <circle cx="12.7" cy="12.7" r="3" fill="#FFD700" opacity="0.8"/>
    <circle cx="-12.7" cy="-12.7" r="3" fill="#90EE90" opacity="0.8"/>
    <circle cx="12.7" cy="-12.7" r="3" fill="#FF8C00" opacity="0.8"/>
    <circle cx="-12.7" cy="12.7" r="3" fill="#FFD700" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="-28" y1="0" x2="28" y2="0" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
    <line x1="-19.8" y1="-19.8" x2="19.8" y2="19.8" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.3"/>
    <line x1="-19.8" y1="19.8" x2="19.8" y2="-19.8" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Company name -->
  <text x="90" y="30" font-family="'Inter', sans-serif" font-size="24" font-weight="700" fill="url(#textGradient)" filter="url(#dropShadow)">
    Galeleo
  </text>
  
  <!-- Tagline -->
  <text x="90" y="48" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#666666">
    Technology &amp; Innovation
  </text>
  
  <!-- Since 1983 -->
  <text x="90" y="62" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#FF8C00">
    Since 1983
  </text>
  
  <!-- Decorative tech elements -->
  <g opacity="0.3">
    <!-- Circuit-like patterns -->
    <rect x="160" y="15" width="12" height="2" fill="#90EE90"/>
    <rect x="174" y="15" width="2" height="8" fill="#90EE90"/>
    <rect x="178" y="15" width="8" height="2" fill="#90EE90"/>
    
    <rect x="160" y="55" width="8" height="2" fill="#FFD700"/>
    <rect x="170" y="55" width="2" height="6" fill="#FFD700"/>
    <rect x="174" y="57" width="6" height="2" fill="#FFD700"/>
    
    <!-- Binary dots pattern -->
    <circle cx="185" cy="25" r="1" fill="#FF8C00"/>
    <circle cx="188" cy="25" r="1" fill="#FFD700"/>
    <circle cx="191" cy="25" r="1" fill="#90EE90"/>
    <circle cx="194" cy="25" r="1" fill="#FF8C00"/>
    
    <circle cx="185" cy="45" r="1" fill="#90EE90"/>
    <circle cx="188" cy="45" r="1" fill="#FF8C00"/>
    <circle cx="191" cy="45" r="1" fill="#FFD700"/>
    <circle cx="194" cy="45" r="1" fill="#90EE90"/>
  </g>
</svg>
